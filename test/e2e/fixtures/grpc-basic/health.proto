// Minimal copy of grpc/health/v1/health.proto, bundled so grpcurl can
// serialize requests without relying on server reflection (which agnhost's
// grpc-health-checking does not register). Source:
// https://github.com/grpc/grpc/blob/master/src/proto/grpc/health/v1/health.proto
syntax = "proto3";

package grpc.health.v1;

service Health {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
}
