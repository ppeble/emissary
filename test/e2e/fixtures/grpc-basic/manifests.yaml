---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-health
  template:
    metadata:
      labels:
        app: grpc-health
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.63.0
          args: ["grpc-health-checking"]
          ports:
            - containerPort: 5000
              name: grpc
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-health
spec:
  selector:
    app: grpc-health
  ports:
    - name: grpc
      port: 5000
      targetPort: 5000
      protocol: TCP
      appProtocol: grpc
---
apiVersion: getambassador.io/v3alpha1
kind: Mapping
metadata:
  name: grpc-health
spec:
  hostname: "*"
  prefix: /grpc.health.v1.Health/
  rewrite: ""
  grpc: true
  service: grpc-health:5000
